<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/static/content/baronpesi_favicon.png">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Totem</title>
    <link rel="stylesheet" href="/static/css/dashboard-totem.css">

    <style id="viewStyle"></style>
</head>
<body>
    <div class="totem-container">
        <div class="steps-wrapper" id="pageContent">
            <div class="step active"></div>
        </div>
    </div>


    <div class="popup" id="reconnectionPopup">
        <div class="popup-content">
            <p>Riconnessione in corso...</p>
            <button id="reconnectionButton" onclick="attemptReconnect()">Riconnetti</button>
        </div>
    </div>

    <div class="popup" id="errorPopup">
        <div class="popup-content">
            <div id="errorIcon" style="font-size:4rem;color:#d32f2f;margin-bottom:0.5rem;">&#10008;</div>
            <p id="errorDescription" style="font-size:1.3rem;font-weight:600;color:#333;"></p>
            <button class="btn btn-primary" onclick="closePopup()" style="margin-top:1rem;padding:12px 32px;font-size:1.1rem;">OK</button>
        </div>
    </div>

    <div class="popup" id="confirmPopup">
        <div class="popup-content">
            <p id="confirmDescription"></p>
            <div class="popup-buttons">
                <button class="btn btn-secondary close-button" onclick="closePopup()">Indietro</button>
                <button class="btn btn-primary" onclick="if(confirmWeighing) confirmWeighing()">Conferma</button>
            </div>
        </div>
    </div>

    <script src="/static/javascript/interceptor.js"></script>
    <script type="module" src="/static/javascript/auth.js"></script>

    <script src="/static/javascript/totem-common.js"></script>
    <script src="/static/javascript/totem-views.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => initTotemPage());
    </script>
</body>
</html>
