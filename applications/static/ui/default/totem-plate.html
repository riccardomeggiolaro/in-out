<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/static/content/baronpesi_favicon.png">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Totem - Targa</title>
    <link rel="stylesheet" href="/static/css/dashboard-totem.css">
    <link rel="stylesheet" href="/static/css/snackbar.css">
    <style>
        .license-plate {
            cursor: pointer;
        }
        .plate-empty .plate-text {
            color: #ccc;
            letter-spacing: 12px;
        }
        .plate-input {
            display: none;
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 8px;
            text-align: center;
            text-transform: uppercase;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            height: 100%;
            padding: 0 8px;
            box-sizing: border-box;
        }
        .plate-input.active {
            display: flex;
        }
        .manual-buttons {
            display: none;
            gap: 12px;
            margin-top: 20px;
        }
        .manual-buttons.active {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="totem-container">
        <div class="totem-header">
            <div class="weight-display">
                <span id="netWeight">------</span>
                <span id="uniteMisure" class="unit">--</span>
            </div>
            <div class="weight-info">
                <span id="tare">------</span>
                <span id="status">--</span>
            </div>
        </div>

        <div class="steps-wrapper">
            <div class="step active">
                <h2>Targa</h2>
                <div class="license-plate plate-empty" id="plateDisplay">
                    <div class="plate-band plate-band-left">
                        <div class="plate-stars">&#9733;</div>
                    </div>
                    <span class="plate-text" id="plateText">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</span>
                    <input class="plate-input" id="manualPlateInput" type="text" maxlength="10" placeholder="AB123CD" autocomplete="off">
                    <div class="plate-band plate-band-right"></div>
                </div>
                <div class="manual-buttons" id="manualButtons">
                    <button class="btn btn-secondary" onclick="exitManualMode()">Annulla</button>
                    <button class="btn btn-primary" onclick="confirmManualPlate()">Conferma</button>
                </div>
                <div class="step-buttons">
                    <button class="btn btn-primary btn-next" id="btnNext" style="display:none" onclick="goToNext()">Avanti</button>
                </div>
            </div>
        </div>
    </div>

    <div id="snackbar"></div>

    <div class="popup" id="reconnectionPopup">
        <div class="popup-content">
            <p>Riconnessione in corso...</p>
            <button id="reconnectionButton" onclick="attemptReconnect()">Riconnetti</button>
        </div>
    </div>

    <div class="popup" id="confirmPopup">
        <div class="popup-content">
            <p id="confirmDescription"></p>
            <div class="popup-buttons">
                <button class="btn btn-secondary close-button" onclick="closePopup()">Annulla</button>
                <button class="btn btn-primary" onclick="if(confirmWeighing) confirmWeighing()">Conferma</button>
            </div>
        </div>
    </div>

    <script src="/static/javascript/interceptor.js"></script>
    <script type="module" src="/static/javascript/auth.js"></script>
    <script src="/static/javascript/snackbar.js"></script>
    <script src="/static/javascript/totem-common.js"></script>
    <script>
        let manualMode = false;

        function showPlate(plate) {
            const display = document.getElementById('plateDisplay');
            display.classList.remove('plate-empty');
            document.getElementById('plateText').textContent = plate;
            document.getElementById('plateText').style.display = '';
            document.getElementById('manualPlateInput').style.display = 'none';
        }

        function goToNext() {
            const hasReservation = selectedIdWeight && selectedIdWeight.id && selectedIdWeight.id !== -1;
            const nextPage = hasReservation ? 'totem-summary.html' : 'totem-customer.html';
            goTo(nextPage);
        }

        function showEmptyPlate() {
            document.getElementById('plateDisplay').classList.add('plate-empty');
            document.getElementById('plateText').innerHTML = '&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;';
            document.getElementById('plateText').style.display = '';
            document.getElementById('manualPlateInput').style.display = 'none';
        }

        function onDataReady() {
            if (selectedVehicle.plate) {
                showPlate(selectedVehicle.plate);
                document.getElementById('btnNext').style.display = '';
            } else {
                showEmptyPlate();
            }
        }

        function onDataUpdate() {
            if (manualMode) return;
            if (selectedVehicle.plate) {
                showPlate(selectedVehicle.plate);
                goToNext();
            }
        }

        // --- Click sulla targa per modalità manuale ---
        document.getElementById('plateDisplay').addEventListener('click', function() {
            if (!manualMode) {
                enterManualMode();
            }
        });

        function enterManualMode() {
            manualMode = true;
            document.getElementById('plateDisplay').classList.remove('plate-empty');
            // Hide plate text, show input inside the plate
            document.getElementById('plateText').style.display = 'none';
            const input = document.getElementById('manualPlateInput');
            input.classList.add('active');
            input.style.display = 'flex';
            input.value = '';
            input.focus();
            document.getElementById('manualButtons').classList.add('active');
        }

        function exitManualMode() {
            manualMode = false;
            document.getElementById('manualPlateInput').classList.remove('active');
            document.getElementById('manualPlateInput').style.display = 'none';
            document.getElementById('manualButtons').classList.remove('active');
            if (selectedVehicle.plate) {
                showPlate(selectedVehicle.plate);
            } else {
                showEmptyPlate();
            }
        }

        function confirmManualPlate() {
            const value = document.getElementById('manualPlateInput').value.trim().toUpperCase();
            if (!value) {
                showSnackbar("snackbar", "Inserisci una targa valida", 'rgb(255, 208, 208)', 'black');
                return;
            }
            if (value.length > 10) {
                showSnackbar("snackbar", "La targa può avere massimo 10 caratteri", 'rgb(255, 208, 208)', 'black');
                return;
            }

            fetch(`/api/data${currentWeigherPath}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data_in_execution: { vehicle: { plate: value } } })
            })
            .then(res => res.json())
            .then(res => {
                if (res.detail) {
                    showSnackbar("snackbar", res.detail, 'rgb(255, 208, 208)', 'black');
                } else {
                    manualMode = false;
                    document.getElementById('manualPlateInput').classList.remove('active');
                    document.getElementById('manualPlateInput').style.display = 'none';
                    document.getElementById('manualButtons').classList.remove('active');
                    showPlate(value);
                    goToNext();
                }
            });
        }

        document.getElementById('manualPlateInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmManualPlate();
        });

        document.addEventListener('DOMContentLoaded', () => initTotemPage());
    </script>
</body>
</html>
