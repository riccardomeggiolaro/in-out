<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/static/content/baronpesi_favicon.png">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Totem - Targa</title>
    <link rel="stylesheet" href="/static/css/dashboard-totem.css">
    <link rel="stylesheet" href="/static/css/snackbar.css">
</head>
<body>
    <div class="totem-container">
        <div class="totem-header">
            <div class="weight-display">
                <span id="netWeight">------</span>
                <span id="uniteMisure" class="unit">--</span>
            </div>
            <div class="weight-info">
                <span id="tare">------</span>
                <span id="status">--</span>
            </div>
        </div>

        <div class="steps-wrapper">
            <div class="step active">
                <h2>Targa</h2>
                <p class="step-description" id="plateStatus">In attesa di lettura targa...</p>
                <div class="license-plate" id="plateDisplay" style="display:none;">
                    <div class="plate-band plate-band-left">
                        <div class="plate-stars">&#9733;</div>
                        <div class="plate-country">I</div>
                    </div>
                    <div class="plate-text" id="plateText"></div>
                    <div class="plate-band plate-band-right"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="snackbar"></div>

    <div class="popup" id="reconnectionPopup">
        <div class="popup-content">
            <p>Riconnessione in corso...</p>
            <button id="reconnectionButton" onclick="attemptReconnect()">Riconnetti</button>
        </div>
    </div>

    <div class="popup" id="confirmPopup">
        <div class="popup-content">
            <p id="confirmDescription"></p>
            <div class="popup-buttons">
                <button class="btn btn-secondary close-button" onclick="closePopup()">Annulla</button>
                <button class="btn btn-primary" onclick="if(confirmWeighing) confirmWeighing()">Conferma</button>
            </div>
        </div>
    </div>

    <script src="/static/javascript/interceptor.js"></script>
    <script type="module" src="/static/javascript/auth.js"></script>
    <script src="/static/javascript/snackbar.js"></script>
    <script src="/static/javascript/totem-common.js"></script>
    <script>
        function showPlate(plate) {
            document.getElementById('plateStatus').textContent = 'Targa rilevata';
            document.getElementById('plateDisplay').style.display = 'flex';
            document.getElementById('plateText').textContent = plate;
        }

        function onDataReady() {
            if (selectedVehicle.plate) {
                showPlate(selectedVehicle.plate);
            }
        }

        function onDataUpdate() {
            if (selectedVehicle.plate) {
                showPlate(selectedVehicle.plate);
                // Auto-advance when plate is detected
                setTimeout(() => goTo('totem-type.html'), 1000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => initTotemPage());
    </script>
</body>
</html>
