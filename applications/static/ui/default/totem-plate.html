<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/static/content/baronpesi_favicon.png">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Totem - Targa</title>
    <link rel="stylesheet" href="/static/css/dashboard-totem.css">
    <link rel="stylesheet" href="/static/css/snackbar.css">
</head>
<body>
    <div class="totem-container">
        <div class="totem-header">
            <div class="weight-display">
                <span id="netWeight">------</span>
                <span id="uniteMisure" class="unit">--</span>
            </div>
            <div class="weight-info">
                <span id="tare">------</span>
                <span id="status">--</span>
            </div>
        </div>

        <div class="steps-wrapper">
            <div class="step active">
                <h2>Inserisci Targa</h2>
                <div class="license-plate" onclick="document.getElementById('plateInput').focus()">
                    <div class="plate-band plate-band-left">
                        <div class="plate-stars">&#9733;</div>
                        <div class="plate-country">I</div>
                    </div>
                    <input type="text" id="plateInput" class="plate-input" maxlength="10" placeholder="_ _ _ _ _ _ _" autocomplete="off" autofocus>
                    <div class="plate-band plate-band-right"></div>
                </div>
                <ul class="suggestions-list" id="plateSuggestions"></ul>
                <div class="step-buttons">
                    <button class="btn btn-primary btn-next" onclick="goTo('totem-type.html')">Avanti</button>
                </div>
            </div>
        </div>
    </div>

    <div id="snackbar"></div>

    <div class="popup" id="reconnectionPopup">
        <div class="popup-content">
            <p>Riconnessione in corso...</p>
            <button id="reconnectionButton" onclick="attemptReconnect()">Riconnetti</button>
        </div>
    </div>

    <div class="popup" id="confirmPopup">
        <div class="popup-content">
            <p id="confirmDescription"></p>
            <div class="popup-buttons">
                <button class="btn btn-secondary close-button" onclick="closePopup()">Annulla</button>
                <button class="btn btn-primary" onclick="if(confirmWeighing) confirmWeighing()">Conferma</button>
            </div>
        </div>
    </div>

    <script src="/static/javascript/interceptor.js"></script>
    <script type="module" src="/static/javascript/auth.js"></script>
    <script src="/static/javascript/snackbar.js"></script>
    <script src="/static/javascript/totem-common.js"></script>
    <script>
        let plateDebounce;

        function onDataReady() {
            const plateInput = document.getElementById('plateInput');
            if (selectedVehicle.plate) plateInput.value = selectedVehicle.plate;
            loadItems('vehicle', 'plate', '', 'plateSuggestions', selectVehicle);
        }

        function onDataUpdate() {
            updateInputIfNotFocused('plateInput', selectedVehicle.plate);
        }

        function onCreateNew(value) {
            createOrSelectAnagrafic('vehicle', 'plate', value);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const plateInput = document.getElementById('plateInput');
            plateInput.addEventListener('input', () => {
                const value = plateInput.value.trim();
                clearTimeout(plateDebounce);
                plateDebounce = setTimeout(() => {
                    loadItems('vehicle', 'plate', value, 'plateSuggestions', selectVehicle);
                }, 250);
            });

            plateInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const value = plateInput.value.trim();
                    if (value) createOrSelectAnagrafic('vehicle', 'plate', value);
                }
            });

            plateInput.addEventListener('blur', () => {
                setTimeout(() => {
                    const suggestionsList = document.getElementById('plateSuggestions');
                    if (!suggestionsList) return;
                    const value = plateInput.value.trim();
                    if (value) {
                        const items = suggestionsList.querySelectorAll('li:not(.create-new)');
                        for (const li of items) {
                            const text = li.querySelector('span')?.textContent?.trim().toUpperCase();
                            if (text === value.toUpperCase()) {
                                li.click();
                                return;
                            }
                        }
                        createOrSelectAnagrafic('vehicle', 'plate', value);
                    }
                    suggestionsList.innerHTML = '';
                }, 200);
            });

            initTotemPage();
        });
    </script>
</body>
</html>
