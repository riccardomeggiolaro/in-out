<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/static/content/baronpesi_favicon.png">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Totem - Tipo Soggetto</title>
    <link rel="stylesheet" href="/static/css/dashboard-totem.css">
    <link rel="stylesheet" href="/static/css/snackbar.css">
</head>
<body>
    <div class="totem-container">
        <div class="totem-header">
            <div class="weight-display">
                <span id="netWeight">------</span>
                <span id="uniteMisure" class="unit">--</span>
            </div>
            <div class="weight-info">
                <span id="tare">------</span>
                <span id="status">--</span>
            </div>
        </div>

        <div class="steps-wrapper">
            <div class="step active">
                <h2>Tipo Soggetto</h2>
                <div class="type-buttons">
                    <button class="btn btn-type" id="btnCustomer" onclick="selectTypeSubject('CUSTOMER')">
                        <span class="btn-type-icon">&#128100;</span>
                        <span class="btn-type-label">Cliente</span>
                    </button>
                    <button class="btn btn-type" id="btnSupplier" onclick="selectTypeSubject('SUPPLIER')">
                        <span class="btn-type-icon">&#128230;</span>
                        <span class="btn-type-label">Fornitore</span>
                    </button>
                </div>
                <div class="step-buttons" id="typeButtons">
                    <button class="btn btn-secondary" onclick="goTo('totem-plate.html')">Indietro</button>
                    <button class="btn btn-primary btn-next" onclick="goTo('totem-subject.html')">Avanti</button>
                </div>
            </div>
        </div>
    </div>

    <div id="snackbar"></div>

    <div class="popup" id="reconnectionPopup">
        <div class="popup-content">
            <p>Riconnessione in corso...</p>
            <button id="reconnectionButton" onclick="attemptReconnect()">Riconnetti</button>
        </div>
    </div>

    <div class="popup" id="confirmPopup">
        <div class="popup-content">
            <p id="confirmDescription"></p>
            <div class="popup-buttons">
                <button class="btn btn-secondary close-button" onclick="closePopup()">Annulla</button>
                <button class="btn btn-primary" onclick="if(confirmWeighing) confirmWeighing()">Conferma</button>
            </div>
        </div>
    </div>

    <script src="/static/javascript/interceptor.js"></script>
    <script type="module" src="/static/javascript/auth.js"></script>
    <script src="/static/javascript/snackbar.js"></script>
    <script src="/static/javascript/totem-common.js"></script>
    <script>
        function selectTypeSubject(type) {
            selectedTypeSubject = type;
            document.getElementById('btnCustomer').classList.toggle('active', type === 'CUSTOMER');
            document.getElementById('btnSupplier').classList.toggle('active', type === 'SUPPLIER');

            fetch(`/api/data${currentWeigherPath}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data_in_execution: { typeSubject: type } })
            })
            .then(res => res.json())
            .then(res => {
                if (res.detail) showSnackbar("snackbar", res.detail, 'rgb(255, 208, 208)', 'black');
            });
        }

        function onDataReady() {
            document.getElementById('btnCustomer').classList.toggle('active', selectedTypeSubject === 'CUSTOMER');
            document.getElementById('btnSupplier').classList.toggle('active', selectedTypeSubject === 'SUPPLIER');

            if (isFromSummary()) {
                const btns = document.getElementById('typeButtons');
                btns.innerHTML = '<button class="btn btn-primary btn-next" onclick="goTo(\'totem-summary.html\')">Avanti</button>';
            }
        }

        function onDataUpdate() {
            document.getElementById('btnCustomer').classList.toggle('active', selectedTypeSubject === 'CUSTOMER');
            document.getElementById('btnSupplier').classList.toggle('active', selectedTypeSubject === 'SUPPLIER');
        }

        document.addEventListener('DOMContentLoaded', () => initTotemPage());
    </script>
</body>
</html>
