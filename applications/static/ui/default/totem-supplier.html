<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/static/content/baronpesi_favicon.png">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Totem - Fornitore</title>
    <link rel="stylesheet" href="/static/css/dashboard-totem.css">
    <link rel="stylesheet" href="/static/css/snackbar.css">
</head>
<body>
    <div class="totem-container">
        <div class="totem-header">
            <div class="weight-display">
                <span id="netWeight">------</span>
                <span id="uniteMisure" class="unit">--</span>
            </div>
            <div class="weight-info">
                <span id="tare">------</span>
                <span id="status">--</span>
            </div>
        </div>

        <div class="steps-wrapper">
            <div class="step active">
                <h2>Fornitore</h2>
                <p class="step-description">Seleziona un fornitore</p>
                <ul class="suggestions-list suggestions-grid" id="supplierGrid"></ul>
                <div class="selected-value" id="selectedSupplierDisplay"></div>
                <div class="step-buttons">
                    <button class="btn btn-secondary" onclick="goTo('totem-plate.html')">Indietro</button>
                    <button class="btn btn-primary btn-next" id="btnNext" style="display:none" onclick="goTo('totem-vector.html')">Avanti</button>
                </div>
            </div>
        </div>
    </div>

    <div id="snackbar"></div>

    <div class="popup" id="reconnectionPopup">
        <div class="popup-content">
            <p>Riconnessione in corso...</p>
            <button id="reconnectionButton" onclick="attemptReconnect()">Riconnetti</button>
        </div>
    </div>

    <div class="popup" id="confirmPopup">
        <div class="popup-content">
            <p id="confirmDescription"></p>
            <div class="popup-buttons">
                <button class="btn btn-secondary close-button" onclick="closePopup()">Annulla</button>
                <button class="btn btn-primary" onclick="if(confirmWeighing) confirmWeighing()">Conferma</button>
            </div>
        </div>
    </div>

    <script src="/static/javascript/interceptor.js"></script>
    <script type="module" src="/static/javascript/auth.js"></script>
    <script src="/static/javascript/snackbar.js"></script>
    <script src="/static/javascript/totem-common.js"></script>
    <script>
        function onDataReady() {
            // Set type to SUPPLIER automatically
            fetch(`/api/data${currentWeigherPath}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data_in_execution: { typeSubject: 'SUPPLIER' } })
            });

            if (selectedSubject.social_reason) {
                document.getElementById('selectedSupplierDisplay').textContent = 'Selezionato: ' + selectedSubject.social_reason;
                document.getElementById('btnNext').style.display = '';
            }
            loadItems('subject', 'social_reason', '', 'supplierGrid', (item) => {
                selectAndAdvance('subject', item, 'totem-vector.html');
            });
        }

        document.addEventListener('DOMContentLoaded', () => initTotemPage());
    </script>
</body>
</html>
