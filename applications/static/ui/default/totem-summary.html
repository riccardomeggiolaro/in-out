<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="/static/content/baronpesi_favicon.png">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Totem - Riepilogo</title>
    <link rel="stylesheet" href="/static/css/dashboard-totem.css">
    <link rel="stylesheet" href="/static/css/snackbar.css">
    <style>
        .summary-row.disabled {
            pointer-events: none;
            opacity: 0.6;
            cursor: default;
        }
        .summary-row.disabled .summary-edit {
            display: none;
        }
    </style>
</head>
<body>
    <div class="totem-container">
        <div class="totem-header">
            <div class="weight-display">
                <span id="netWeight">------</span>
                <span id="uniteMisure" class="unit">--</span>
            </div>
            <div class="weight-info">
                <span id="tare">------</span>
                <span id="status">--</span>
            </div>
        </div>

        <div class="steps-wrapper">
            <div class="step active">
                <h2>Riepilogo</h2>
                <div class="summary-card">
                    <div class="summary-row" id="rowPlate" onclick="goTo('totem-plate.html?from=summary')">
                        <span class="summary-label">Targa</span>
                        <span class="summary-value" id="summaryPlate">-</span>
                        <span class="summary-edit">&#9998;</span>
                    </div>
                    <div class="summary-row" id="rowType" onclick="goTo('totem-type.html?from=summary')">
                        <span class="summary-label">Tipo</span>
                        <span class="summary-value" id="summaryType">-</span>
                        <span class="summary-edit">&#9998;</span>
                    </div>
                    <div class="summary-row" id="rowSubject" onclick="goTo('totem-subject.html?from=summary')">
                        <span class="summary-label">Ragione Sociale</span>
                        <span class="summary-value" id="summarySubject">-</span>
                        <span class="summary-edit">&#9998;</span>
                    </div>
                    <div class="summary-row" id="rowVector" onclick="goTo('totem-vector.html?from=summary')">
                        <span class="summary-label">Vettore</span>
                        <span class="summary-value" id="summaryVector">-</span>
                        <span class="summary-edit">&#9998;</span>
                    </div>
                    <div class="summary-row" id="rowDriver" onclick="goTo('totem-driver.html?from=summary')">
                        <span class="summary-label">Autista</span>
                        <span class="summary-value" id="summaryDriver">-</span>
                        <span class="summary-edit">&#9998;</span>
                    </div>
                    <div class="summary-row" id="rowMaterial" onclick="goTo('totem-material.html?from=summary')">
                        <span class="summary-label">Materiale</span>
                        <span class="summary-value" id="summaryMaterial">-</span>
                        <span class="summary-edit">&#9998;</span>
                    </div>
                </div>
                <div class="step-buttons summary-buttons">
                    <button class="btn btn-secondary" id="btnBack" onclick="goTo('totem-material.html')">Indietro</button>
                    <button class="btn btn-weighing" onclick="handleGenericWeighing()">Pesatura Generica</button>
                </div>
            </div>
        </div>
    </div>

    <div id="snackbar"></div>

    <div class="popup" id="reconnectionPopup">
        <div class="popup-content">
            <p>Riconnessione in corso...</p>
            <button id="reconnectionButton" onclick="attemptReconnect()">Riconnetti</button>
        </div>
    </div>

    <div class="popup" id="confirmPopup">
        <div class="popup-content">
            <p id="confirmDescription"></p>
            <div class="popup-buttons">
                <button class="btn btn-secondary close-button" onclick="closePopup()">Annulla</button>
                <button class="btn btn-primary" onclick="if(confirmWeighing) confirmWeighing()">Conferma</button>
            </div>
        </div>
    </div>

    <script src="/static/javascript/interceptor.js"></script>
    <script type="module" src="/static/javascript/auth.js"></script>
    <script src="/static/javascript/snackbar.js"></script>
    <script src="/static/javascript/totem-common.js"></script>
    <script>
        let isReservationMode = false;

        function updateSummary() {
            document.getElementById('summaryPlate').textContent = selectedVehicle.plate || '-';
            document.getElementById('summaryType').textContent = selectedTypeSubject === 'CUSTOMER' ? 'Cliente' : 'Fornitore';
            document.getElementById('summarySubject').textContent = selectedSubject.social_reason || '-';
            document.getElementById('summaryVector').textContent = selectedVector.social_reason || '-';
            document.getElementById('summaryDriver').textContent = selectedDriver.social_reason || '-';
            document.getElementById('summaryMaterial').textContent = selectedMaterial.description || '-';
        }

        function applyReservationMode() {
            // Check if there's a reservation (id_selected has an id set)
            isReservationMode = selectedIdWeight && selectedIdWeight.id && selectedIdWeight.id !== -1;

            const rowIds = ['rowPlate', 'rowType', 'rowSubject', 'rowVector', 'rowDriver'];
            rowIds.forEach(id => {
                const row = document.getElementById(id);
                if (row) {
                    if (isReservationMode) {
                        row.classList.add('disabled');
                    } else {
                        row.classList.remove('disabled');
                    }
                }
            });

            // Update back button destination
            const btnBack = document.getElementById('btnBack');
            if (btnBack) {
                btnBack.onclick = () => goTo(isReservationMode ? 'totem-plate.html' : 'totem-material.html');
            }
        }

        function onDataReady() {
            updateSummary();
            applyReservationMode();
        }

        function onDataUpdate() {
            updateSummary();
            applyReservationMode();
        }

        document.addEventListener('DOMContentLoaded', () => initTotemPage());
    </script>
</body>
</html>
