<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BARON Cloud Portal{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/api.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="brand">BARON <span>Cloud Portal</span></div>
        <nav id="nav" class="nav"></nav>
    </header>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
