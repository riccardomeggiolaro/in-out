{% extends "base.html" %}
{% block title %}Siti - BARON Cloud Portal{% endblock %}
{% block content %}
<h1>Siti</h1>

<form id="create-site-form" class="inline-form">
    <input type="text" name="name" placeholder="Nome sito (es. Impianto Milano)" required>
    <input type="text" name="code" placeholder="codice-univoco" pattern="[a-z0-9][a-z0-9\-_]{1,63}" required>
    <button type="submit">Crea sito</button>
</form>

<div id="new-key-banner" class="api-key-banner hidden"></div>

<table id="sites-table">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Codice</th>
            <th>API key</th>
            <th>Attivo</th>
            <th>Azioni</th>
        </tr>
    </thead>
    <tbody id="sites-body"></tbody>
</table>

<h2>Utenti sito</h2>
<form id="create-user-form" class="inline-form">
    <select name="site_id" id="user-site-select" required></select>
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required minlength="6">
    <button type="submit">Crea utente</button>
</form>
<table id="users-table">
    <thead>
        <tr>
            <th>Username</th>
            <th>Sito</th>
            <th>Azioni</th>
        </tr>
    </thead>
    <tbody id="users-body"></tbody>
</table>

<script src="/static/js/sites.js" defer></script>
{% endblock %}
